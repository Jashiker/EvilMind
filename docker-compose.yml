version: "3.8"

services:
  truth-hunter:
    build:
      context: .
    image: truth-hunter:latest
    container_name: truth-hunter
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    # Claude CLI (npm) 和 OpenCode CLI (binary) 需要的环境变量
    environment:
      - ANTHROPIC_API_KEY=${DEEPSEEK_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.deepseek.com/anthropic}
    volumes:
      # 持久化知识库 (chromadb)
      - kb_data:/app/data/chroma_db
      # 持久化核查报告
      - reports:/app/reports
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/', timeout=5).raise_for_status()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  kb_data:
  reports:
